name: Deployment Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name : Echo path
        run: pwd
      - name : Echo path
        run: cd ../..
      - name : Echo path
        run: pwd
      - name : Echo path
        run: ls -l
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v2
        with:
          cache: 'npm'
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run eslint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3.9.1
        with:
          cache: 'npm'
          node-version: '20'
      - name: Install dependencies
        run: npm instal
      - name: Build
        run: npm run build

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3.9.1
        with:
          cache: 'npm'
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Test
        run: npm test



